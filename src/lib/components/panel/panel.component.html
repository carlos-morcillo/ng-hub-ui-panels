@if (accordionView()) {
	<h2 class="hub-panels__accordion-header">
		<button
			type="button"
			class="hub-panels__accordion-btn"
			[class.hub-panels__accordion-btn--collapsed]="!active()"
			[id]="id() + '-link'"
			[disabled]="disabled() || tabset.formDisabled()"
			[attr.aria-expanded]="active()"
			[attr.aria-controls]="id()"
			(click)="onAccordionHeaderClick()"
			(keydown)="onAccordionHeaderKeydown($event)"
		>
			@if (headingRef(); as headingTemplate) {
				<ng-container [ngTemplateOutlet]="headingTemplate" />
			} @else {
				{{ heading() }}
			}
			@if (removable()) {
				<span class="hub-panels__remove-btn" aria-hidden="true" (click)="$event.stopPropagation(); removeSelf()">&times;</span>
			}
		</button>
	</h2>
}

<!-- Single projection slot for every view. In the strip views the wrappers are
	 plain pass-throughs; in the accordion view they become the animated collapse
	 region. A single <ng-content> avoids the lost-projection bug that two
	 conditional slots cause. -->
<div
	[class.hub-panels__accordion-collapse]="accordionView()"
	[class.hub-panels__accordion-collapse--collapsed]="accordionView() && !active()"
	[attr.role]="accordionView() ? 'region' : null"
	[attr.id]="accordionView() ? id() : null"
	[attr.aria-labelledby]="accordionView() ? id() + '-link' : null"
	[attr.aria-hidden]="accordionView() ? !active() : null"
	[attr.inert]="accordionView() && !active() ? '' : null"
>
	<div [class.hub-panels__accordion-body]="accordionView()">
		<ng-content />
	</div>
</div>
