@if (accordionView()) {
	<h2 class="hub-panels__accordion-header" [class.hub-panels__accordion-header--expanded]="active()">
		<button
			type="button"
			class="hub-panels__accordion-btn"
			[class.hub-panels__accordion-btn--collapsed]="!active()"
			[id]="id() + '-link'"
			[disabled]="disabled() || tabset?.formDisabled()"
			[attr.aria-expanded]="active()"
			[attr.aria-controls]="id()"
			(click)="onAccordionHeaderClick()"
			(keydown)="onAccordionHeaderKeydown($event)"
		>
			@if (headingRef(); as headingTemplate) {
				<ng-container [ngTemplateOutlet]="headingTemplate" />
			} @else {
				{{ heading() }}
			}
			@if (removable()) {
				<span class="hub-panels__remove-btn" aria-hidden="true" (click)="$event.stopPropagation(); removeSelf()">&times;</span>
			}
		</button>

		<!-- Row affordances live OUTSIDE the disclosure button: a control nested
			 in another control is invalid and unreachable by keyboard. They stay
			 visible while the row is collapsed, unlike `hubPanelHeader`. -->
		@if (headingActionsRef(); as actionsTemplate) {
			<span class="hub-panels__accordion-actions">
				<ng-container [ngTemplateOutlet]="actionsTemplate" />
			</span>
		}
	</h2>
}

<!-- Projection slots for every view. In the strip views the wrappers are plain
	 pass-throughs; in the accordion view they become the animated collapse
	 region. The header/footer `select` slots and the default `<ng-content>` are
	 all UNCONDITIONAL — never wrapped in `@if` — to avoid the lost-projection
	 bug that conditional slots cause. Header/footer render in every view; the
	 `card` view styles them as the card's header and footer bands. -->
<div
	class="hub-panels__panel-collapse"
	[class.hub-panels__accordion-collapse]="accordionView()"
	[class.hub-panels__accordion-collapse--collapsed]="accordionView() && !active()"
	[attr.role]="accordionView() ? 'region' : null"
	[attr.id]="accordionView() ? id() : null"
	[attr.aria-labelledby]="accordionView() ? id() + '-link' : null"
	[attr.aria-hidden]="accordionView() ? !active() : null"
	[attr.inert]="accordionView() && !active() ? '' : null"
>
	<div class="hub-panels__panel-region" [class.hub-panels__accordion-body]="accordionView()">
		<ng-content select="[hubPanelHeader]" />
		<div class="hub-panels__panel-body">
			<ng-content />
		</div>
		<ng-content select="[hubPanelFooter]" />
	</div>
</div>
